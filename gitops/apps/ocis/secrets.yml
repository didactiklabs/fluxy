apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ocis-secrets
spec:
  refreshInterval: '1h'
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: ocis-secrets
  data:
    - secretKey: reva-ldap-bind-password
      remoteRef:
        key: secrets/authentik/ldap
        property: bind_password
    - secretKey: idp-ldap-bind-password
      remoteRef:
        key: secrets/authentik/ldap
        property: bind_password
    - secretKey: graph-ldap-bind-password
      remoteRef:
        key: secrets/authentik/ldap
        property: bind_password
